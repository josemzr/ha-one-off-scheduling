services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - HA_URL=${HA_URL}
      - HA_TOKEN=${HA_TOKEN}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
